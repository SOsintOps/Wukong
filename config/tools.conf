###############################################################################
# tools.conf - Speculator OSINT Tool Manifest
# Version: 1.0.0
# Single source of truth for all tools available in the GUI launcher scripts.
#
# FORMAT (pipe-delimited, one line per tool):
#   name|id|category|check_type|check_value|command_template|output_ext|needs_venv|venv_name
#
# FIELDS:
#   name           Display name shown in Zenity GUI
#   id             Internal identifier, lowercase, no spaces
#   category       Which script handles it: email, username, fullname, phone,
#                  hash, domain, instagram, reddit, video, archives, image,
#                  frameworks
#   check_type     How to verify availability:
#                    binary  = command -v check_value
#                    repo    = directory exists at PROGRAMS_DIR/check_value
#                    pipx    = command -v check_value
#                    go      = command -v check_value
#   check_value    Binary name (for binary/pipx/go) or repo directory name
#   command_template  Command to run. Placeholders:
#                    {target}        target input (email, username, domain, etc.)
#                    {outfile}       full path to output file
#                    {outdir}        evidence session directory
#                    {programs_dir}  PROGRAMS_DIR path
#   output_ext     File extension for output: txt, csv, json, pdf, ts, or
#                  "dir" for directory output
#   needs_venv     yes or no; whether the tool needs venv activation
#   venv_name      Name of the venv directory inside the repo (e.g.
#                  "blackbirdEnvironment"); empty string if not needed
#
# PARSING EXAMPLE (pure Bash):
#   while IFS='|' read -r name id category check_type check_value \
#       command_template output_ext needs_venv venv_name; do
#       [[ "$name" =~ ^#.*$ || -z "$name" ]] && continue
#       # use fields here
#   done < config/tools.conf
#
# NOTES:
#   - Lines starting with # are comments (skipped by the parser).
#   - Blank lines are skipped by the parser.
#   - Do not use pipe characters inside field values.
#   - theHarvester uses uv-managed .venv, not the standard Environment pattern.
#   - Mr.Holmes has no venv; it runs with system python3.
#   - Tools installed via pipx/go are on PATH at ~/.local/bin or ~/go/bin.
###############################################################################

